<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Website</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <!-- Hedaer / Navbar -->
    <header>
        <navbar class="navbar">
            <a href="#" class="navbar__logo">
                <h2 class="navbar__logo-text">☕ Coffee</h2>
            </a>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="#" class="navbar__link">Home</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__link">About</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__link">Menu</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__link">Testimanials</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__link">Gallery</a>
                </li>
                <li class="navbar__item">
                    <a href="#" class="navbar__link">Contact</a>
                </li>
            </ul>
        </navbar>
    </header>
    <main>
        <!-- Hero section -->
        <section class="hero">
            <div class="hero__container">
                <div class="hero__content">
                    <h2 class="hero__title">Best Coffee</h2>
                    <h3 class="hero__subtitle">Make your day great with our special</h3>
                    <p class="hero__description">Welcome to our coffee paradis, where
                        every bean tells a story and every cup sparks joy.
                    </p>

                    <div class="hero__actions">
                        <a href="#" class="hero__button hero__button--primary">Order Now</a>
                        <a href="#" class="hero__button hero__button--secondary">Contact Us</a>
                    </div>
                </div>
                <div class="hero__image-wrapper">
                        <img src="images/coffee-hero-section.png" alt="Hero" class="hero__image">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
